<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaiju Kitchen | Menú Digital</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="menu-kaiju.css">
    <!-- Estilos de KaijuBrush ahora en menu-kaiju.css -->
</head>

<body>
    <!-- HEADER -->
    <header>
        <div class="logo-wrap">
            <img src="kaiju-logo.png" alt="Kaiju Kitchen Logo" class="kaiju-header-logo" />
            <div class="header-center-content">
                <div class="logo" id="logo"><span class="logo kaiju-brush">Kaiju</span> Kitchen</div>
                <div class="sub">怪獣キッチン</div>
                <div class="tagline">Elige tu nivel de destrucción</div>
            </div>
        </div>
    </header>
    <!-- NAV -->
    <nav>
        <div class="nav-tabs" id="navTabs"></div>
    </nav>
    <!-- BUSCADOR -->
    <div class="buscador-wrap">
        <input type="text" class="buscador" id="buscador" placeholder="Buscar en el menú..." autocomplete="off">
    </div>
    <!-- MAIN -->
    <main id="mainContent"></main>
    <!-- Carrito eliminado -->
    <!-- FOOTER -->
    <footer>
        <div class="footer-redes">
            <a href="https://www.instagram.com/kaijukitchen9/" target="_blank" title="Instagram"><span>📸</span></a>
            <a href="https://www.facebook.com/profile.php?id=61563228693821" target="_blank" title="Facebook"><span>📘</span></a>
        </div>
        <div class="footer-horario">Lun–Sab 5:00 P.M.–23:00 P.M.</div>
        <div class="footer-tagline">Nadie sale con hambre. Nadie.</div>
    </footer>
    <!-- MODAL PRODUCTO (dinámico) -->
    <div id="modalBg" style="display:none;"></div>
    <!-- Modal carrito eliminado -->
    <script>
        // ===================
        // DATOS DEL MENÚ
        // ===================
        const menu = [
            {
                categoria: 'Productos principales',
                id: 'principales',
                productos: [
                    {
                        id: 'boneless',
                        nombre: 'BONELESS',
                        desc: 'Elige tu salsa y tamaño',
                        img: 'Imagenes/MechaBoneless.jpeg',
                        precios: [85, 130, 170],
                        tamanos: ['Criatura', 'Bestia', 'Kaiju'],
                        iconos: ['🌿', '🐾', '🔥'],
                        salsa: true,
                    },
                    {
                        id: 'mecha-boneless',
                        nombre: 'MECHA-BONELESS',
                        desc: 'Empanizados especiales (Takis o Doritos)',
                        img: 'Imagenes/MechaBoneless.jpeg',
                        precios: [95, 140, 180],
                        tamanos: ['Criatura', 'Bestia', 'Kaiju'],
                        iconos: ['🌿', '🐾', '🔥'],
                        salsa: true,
                        badge: 'NUEVO',
                    },
                    {
                        id: 'nido-kaiju',
                        nombre: 'NIDO KAIJU',
                        desc: 'Papas con queso, boneless y tocino',
                        img: 'Imagenes/NidoMenu.png',
                        precios: [null, 160, null],
                        tamanos: [null, 'Bestia', null],
                        iconos: [null, '🐾', null],
                        salsa: false,
                        badge: 'MÁS PEDIDO',
                    },
                    {
                        id: 'garras-kaiju',
                        nombre: 'GARRAS DE KAIJU',
                        desc: 'Chicken Tenders',
                        img: 'Imagenes/Garras.png',
                        precios: [85, 125, 165],
                        tamanos: ['Criatura', 'Bestia', 'Kaiju'],
                        iconos: ['🌿', '🐾', '🔥'],
                        salsa: true,
                    },
                    {
                        id: 'alitas',
                        nombre: 'ALITAS',
                        desc: 'Alitas clásicas con salsa a elegir',
                        img: 'Imagenes/Alitas.png',
                        precios: [90, 135, 165],
                        tamanos: ['Criatura', 'Bestia', 'Kaiju'],
                        iconos: ['🌿', '🐾', '🔥'],
                        salsa: true,
                    },
                ]
            },
            {
                categoria: 'Acompañamientos',
                id: 'acomp',
                productos: [
                    { nombre: 'Meteor Fries', precio: 50, img: 'https://images.unsplash.com/photo-1506084868230-bb9d95c24759?auto=format&fit=crop&w=600&q=80' },
                    { nombre: 'Lava Fries', precio: 80, img: 'https://images.unsplash.com/photo-1504674900247-ec6b0b1b7982?auto=format&fit=crop&w=600&q=80' },
                    { nombre: 'Atomic Rings', precio: 65, img: 'imagenes/AtomicRings.jpeg' },
                ]
            },
            {
                categoria: 'Bebidas',
                id: 'bebidas',
                productos: [
                    { nombre: 'Reactor Cola', precio: 25, img: 'https://images.unsplash.com/photo-1519864600265-abb23847ef2c?auto=format&fit=crop&w=600&q=80' },
                    { nombre: 'Agua Primordial', precio: 18, img: 'https://images.unsplash.com/photo-1502741338009-cac2772e18bc?auto=format&fit=crop&w=600&q=80' },
                    { nombre: 'Energía Nuclear', precio: 40, img: 'https://images.unsplash.com/photo-1504674900247-0877df9cc836?auto=format&fit=crop&w=600&q=80' },
                    { nombre: 'Uvola', precio: 50, img: 'https://images.unsplash.com/photo-1506084868230-bb9d95c24759?auto=format&fit=crop&w=600&q=80' },
                    { nombre: 'Limonada Mineral', precio: 50, img: 'https://images.unsplash.com/photo-1464306076886-debca5e8a6b0?auto=format&fit=crop&w=600&q=80' },
                ]
            },
            {
                categoria: 'Combos Kaiju',
                id: 'combos',
                productos: [
                    { nombre: 'Combo Bestia', incluye: 'Boneless Bestia + Papas + Bebida', precio: 155, ahorro: 'Hasta $25' },
                    { nombre: 'Combo Kaiju', incluye: 'Boneless Kaiju + Papas + Bebida', precio: 195, ahorro: 'Hasta $30' },
                    { nombre: 'Combo Nido Kaiju', incluye: 'Nido Kaiju + Bebida', precio: 180, ahorro: 'Hasta $25' },
                ]
            },
            {
                categoria: 'Extras',
                id: 'extras',
                productos: [
                    { nombre: 'Salsa extra', precio: 12 },
                    { nombre: 'Aderezo extra', precio: 12 },
                    { nombre: 'Extra queso', precio: 15 },
                    { nombre: 'Extra tocino', precio: 20 },
                ]
            },
        ];
        // Salsas
        const salsas = [
            { nombre: 'Ajo Parmesano', nivel: 1, color: '🟢', desc: 'Suave' },
            { nombre: 'BBQ', nivel: 2, color: '🟡', desc: 'Suave-Media' },
            { nombre: 'Honey-Chipotle', nivel: 3, color: '🟠', desc: 'Media' },
            { nombre: 'Buffalo', nivel: 4, color: '🔴', desc: 'Picante' },
            { nombre: 'Mango Habanero', nivel: 5, color: '🔥', desc: 'Muy Picante' },
        ];
        // ===================
        // RENDERIZADO
        // ===================
        const mainContent = document.getElementById('mainContent');
        const navTabs = document.getElementById('navTabs');
        // Render tabs
        const categorias = menu.map(cat => ({ nombre: cat.categoria, id: cat.id }));
        navTabs.innerHTML = categorias.map((cat, i) => `<button class="nav-tab${i === 0 ? ' active' : ''}" data-cat="${cat.id}">${cat.nombre}</button>`).join('');
        // Render secciones
        function renderMenu(filtro = '') {
            mainContent.innerHTML = '';
            menu.forEach(cat => {
                let productos = cat.productos;
                if (filtro) {
                    productos = productos.filter(p => {
                        const nombre = p.nombre || p.id || '';
                        const desc = p.desc || p.incluye || '';
                        return nombre.toLowerCase().includes(filtro) || desc.toLowerCase().includes(filtro);
                    });
                    if (!productos.length) return;
                }
                const section = document.createElement('section');
                section.id = cat.id;
                section.innerHTML = `<div class="cat-title">${cat.categoria}</div>`;
                if (cat.id === 'principales') {
                    // Productos principales con tarjetas
                    const grid = document.createElement('div');
                    grid.className = 'productos-grid';
                    productos.forEach(prod => {
                        grid.appendChild(renderProductoCard(prod));
                    });
                    section.appendChild(grid);
                } else if (cat.id === 'acomp' || cat.id === 'bebidas' || cat.id === 'extras') {
                    // Lista simple
                    const list = document.createElement('div');
                    list.className = 'simple-list';
                    productos.forEach(prod => {
                        list.appendChild(renderSimpleCard(prod));
                    });
                    section.appendChild(list);
                } else if (cat.id === 'combos') {
                    // Combos
                    const list = document.createElement('div');
                    list.className = 'simple-list';
                    productos.forEach(prod => {
                        list.appendChild(renderComboCard(prod));
                    });
                    section.appendChild(list);
                }
                mainContent.appendChild(section);
            });
        }
        // Tarjeta producto principal
        function renderProductoCard(prod) {
            const card = document.createElement('div');
            card.className = 'producto-card';
            card.onclick = () => abrirModal(prod);
            card.innerHTML = `
        <img class="producto-img" src="${prod.img}" alt="${prod.nombre}">
        <div class="producto-info">
          <div class="producto-nombre">
            ${prod.nombre}
            ${prod.badge ? `<span class="badge ${prod.badge === 'NUEVO' ? 'nuevo' : 'mas-pedido'}">${prod.badge}</span>` : ''}
          </div>
          <div class="producto-desc">${prod.desc}</div>
          <div class="producto-precios">
            <div class="precio-btns">
              ${prod.precios.map((precio, i) => precio ? `<button class="precio-btn${i === 0 ? ' selected' : ''}" data-idx="${i}" onclick="event.stopPropagation();seleccionarTamano(event, '${prod.id}', ${i})">${prod.iconos[i]} ${prod.tamanos[i]}</button>` : '').join('')}
            </div>
            <span class="precio">$${prod.precios.find(p => p)}</span>
          </div>
        </div>
      `;
            return card;
        }
        // Tarjeta simple
        function renderSimpleCard(prod) {
            const card = document.createElement('div');
            card.className = 'simple-card';
            card.innerHTML = `
        <div class="simple-nombre">${prod.nombre}</div>
        <div class="simple-precio">$${prod.precio}</div>
      `;
            return card;
        }
        // Tarjeta combo
        function renderComboCard(prod) {
            const card = document.createElement('div');
            card.className = 'simple-card';
            card.innerHTML = `
        <div class="simple-nombre">${prod.nombre}</div>
        <div>${prod.incluye}</div>
        <div class="simple-precio">$${prod.precio}</div>
        <div class="simple-ahorro">${prod.ahorro}</div>
      `;
            return card;
        }
        // ===================
        // MODAL PRODUCTO
        // ===================
        const modalBg = document.getElementById('modalBg');
        function abrirModal(prod) {
            let tamanoSel = prod.precios.findIndex(p => p);
            let salsaSel = 0;
            modalBg.style.display = 'flex';
            modalBg.innerHTML = `
        <div class="modal">
          <button class="modal-cerrar" onclick="cerrarModal()">×</button>
          <img class="modal-img" src="${prod.img}" alt="${prod.nombre}">
          <div class="modal-nombre">${prod.nombre} ${prod.badge ? `<span class=\"badge ${prod.badge === 'NUEVO' ? 'nuevo' : 'mas-pedido'}\">${prod.badge}</span>` : ''}</div>
          <div class="modal-desc">${prod.desc}</div>
          ${prod.precios.filter(p => p).length > 1 ? `
          <div class="modal-precios">
            <div class="precio-btns">
              ${prod.precios.map((precio, i) => precio ? `<button class="precio-btn${i === tamanoSel ? ' selected' : ''}" data-idx="${i}" onclick="event.stopPropagation();seleccionarTamanoModal(event, ${i})">${prod.iconos[i]} ${prod.tamanos[i]}</button>` : '').join('')}
            </div>
            <span class="precio" id="modalPrecio">$${prod.precios[tamanoSel]}</span>
          </div>` : `<div class="modal-precios"><span class="precio">$${prod.precios.find(p => p)}</span></div>`}
          ${prod.salsa ? `
          <div class="modal-salsas">
            <div class="salsa-selector">
              ${salsas.map((s, i) => `<button class="salsa-btn${i === salsaSel ? ' selected' : ''}" data-idx="${i}" onclick="event.stopPropagation();seleccionarSalsaModal(event, ${i})">${s.color} ${s.nombre}</button>`).join('')}
            </div>
            <div class="salsa-nivel"><div class="salsa-nivel-bar" id="salsaNivelBar" style="width:${salsas[salsaSel].nivel * 20}%"></div></div>
            <div style="font-size:0.98rem; color:var(--amarillo);">Nivel: ${salsas[salsaSel].desc}</div>
          </div>` : ''}
          <!-- Botón de agregar eliminado junto con el carrito -->
        </div>
      `;
            // Guardar selección en modal
            window._modalProd = prod;
            window._modalTamano = tamanoSel;
            window._modalSalsa = salsaSel;
        }
        function cerrarModal() {
            modalBg.style.display = 'none';
            modalBg.innerHTML = '';
        }
        function seleccionarTamanoModal(e, idx) {
            window._modalTamano = idx;
            const btns = modalBg.querySelectorAll('.precio-btn');
            btns.forEach((b, i) => b.classList.toggle('selected', i === idx));
            const prod = window._modalProd;
            modalBg.querySelector('#modalPrecio').textContent = `$${prod.precios[idx]}`;
        }
        function seleccionarSalsaModal(e, idx) {
            window._modalSalsa = idx;
            const btns = modalBg.querySelectorAll('.salsa-btn');
            btns.forEach((b, i) => b.classList.toggle('selected', i === idx));
            modalBg.querySelector('#salsaNivelBar').style.width = (salsas[idx].nivel * 20) + '%';
            modalBg.querySelector('.modal-salsas div[style*="font-size"]').textContent = `Nivel: ${salsas[idx].desc}`;
        }
        // Carrito eliminado
        // ===================
        // NAVEGACIÓN
        // ===================
        navTabs.querySelectorAll('.nav-tab').forEach(tab => {
            tab.onclick = function () {
                navTabs.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                document.getElementById(this.dataset.cat).scrollIntoView({ behavior: 'smooth', block: 'start' });
            };
        });
        // ===================
        // BUSCADOR
        // ===================
        const buscador = document.getElementById('buscador');
        buscador.addEventListener('input', function () {
            const val = this.value.trim().toLowerCase();
            this.style.boxShadow = val ? '0 0 16px 2px var(--rojo)' : '';
            renderMenu(val);
        });
        // ===================
        // TAMAÑO EN TARJETA
        // ===================
        function seleccionarTamano(e, prodId, idx) {
            e.stopPropagation();
            const card = e.target.closest('.producto-card');
            card.querySelectorAll('.precio-btn').forEach((b, i) => b.classList.toggle('selected', i === idx));
            const prod = menu[0].productos.find(p => p.id === prodId);
            card.querySelector('.precio').textContent = `$${prod.precios[idx]}`;
        }
        // ===================
        // INICIALIZAR
        // ===================
        renderMenu();
        actualizarCarrito();
    </script>
</body>

</html>
