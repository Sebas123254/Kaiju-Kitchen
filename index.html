                // Sidebar retráctil en móvil
                const sidebar = document.getElementById('sidebarLeft');
                const sidebarToggle = document.getElementById('sidebarToggle');
                const sidebarClose = document.getElementById('sidebarClose');
                function syncSidebarState() {
                    const isOpen = window.innerWidth <= 900
                        ? sidebar.classList.contains('open')
                        : !document.body.classList.contains('sidebar-hidden');
                    sidebarToggle.setAttribute('aria-expanded', String(isOpen));
                    sidebar.setAttribute('aria-hidden', String(!isOpen));
                    document.body.classList.toggle('sidebar-open', window.innerWidth <= 900 && isOpen);
                }
                function toggleSidebar() {
                    if (window.innerWidth <= 900) {
                        sidebar.classList.toggle('open');
                    } else {
                        document.body.classList.toggle('sidebar-hidden');
                    }
                    syncSidebarState();
                }
                sidebarToggle.addEventListener('click', toggleSidebar);
                sidebarClose.addEventListener('click', toggleSidebar);
                // Cerrar sidebar al hacer click fuera en móvil
                document.addEventListener('click', function(e) {
                    if (window.innerWidth <= 900 && sidebar.classList.contains('open')) {
                        if (!sidebar.contains(e.target) && e.target !== sidebarToggle) {
                            sidebar.classList.remove('open');
                            syncSidebarState();
                        }
                    }

        // Sección 'Sobre Nosotros'
        function renderAboutSection() {

        // Render secciones con animación reveal
        function renderMenu(filtro = '') {
            mainContent.innerHTML = '';
            // Insertar sección "Sobre Nosotros" al inicio
            const aboutSection = renderAboutSection();
            mainContent.appendChild(aboutSection);
            gsap.from(aboutSection, {
                opacity: 0,
                y: 40,
                duration: 0.6,
                ease: 'power3.out'
            });
            menu.forEach((cat, idx) => {
                let productos = cat.productos;
                if (filtro) {
                    productos = productos.filter(p => {
                        const nombre = p.nombre || p.id || '';
                        const desc = p.desc || p.incluye || '';
                        return nombre.toLowerCase().includes(filtro) || desc.toLowerCase().includes(filtro);
                    });
                    if (!productos.length) return;
                }
                const section = document.createElement('section');
                section.id = cat.id;
                section.innerHTML = `<div class="cat-title">${cat.categoria}</div>`;
                if (cat.id === 'principales') {
                    const grid = document.createElement('div');
                    grid.className = 'productos-grid';
                    productos.forEach(prod => {
                        grid.appendChild(renderProductoCard(prod));
                    });
                    section.appendChild(grid);
                } else if (cat.id === 'acomp' || cat.id === 'bebidas' || cat.id === 'extras') {
                    const list = document.createElement('div');
                    list.className = 'simple-list';
                    productos.forEach(prod => {
                        list.appendChild(renderSimpleCard(prod));
                    });
                    section.appendChild(list);
                } else if (cat.id === 'combos') {
                    const list = document.createElement('div');
                    list.className = 'simple-list';
                    productos.forEach(prod => {
                        list.appendChild(renderComboCard(prod));
                    });
                    section.appendChild(list);
                }
                mainContent.appendChild(section);
                if (cat.id === 'principales') {
                    const salsasSection = renderSalsasSection();
                    mainContent.appendChild(salsasSection);
                    gsap.from(salsasSection, {
                        opacity: 0,
                        y: 60,
                        duration: 0.7,
                        delay: 0.1 + idx * 0.08 + 0.04,
                        ease: 'power3.out'
                    });
                }
                // Reveal animation para cada sección
                gsap.from(section, {
                    opacity: 0,
                    y: 60,
                    duration: 0.7,
                    delay: 0.1 + idx * 0.08,
                    ease: 'power3.out'
                });
            });

        }
                // Tarjeta producto principal
                function renderProductoCard(prod) {
                        const card = document.createElement('div');
                        card.className = 'producto-card';
                        
                        // Obtener índice por defecto (primer tamaño disponible)
                        const defaultIdx = prod.precios.findIndex(p => p);
                        
                        card.innerHTML = `
                                <img class="producto-img" src="${prod.img}" alt="${prod.nombre}" loading="lazy">
                                <div class="producto-info">
                                    <div class="producto-nombre">
                                        ${prod.nombre}
                                        ${prod.badge ? `<span class="badge ${prod.badge === 'NUEVO' ? 'nuevo' : 'mas-pedido'}">${prod.badge}</span>` : ''}
                                    </div>
                                    <div class="producto-desc">${prod.desc}</div>
                                    <div class="producto-precios">
                                        <div class="precio-btns">
                                            ${prod.precios.map((precio, i) => precio ? `<button type="button" class="precio-btn${i === defaultIdx ? ' selected' : ''}" data-idx="${i}">${prod.iconos[i]} ${prod.tamanos[i]}</button>` : '').join('')}
                                        </div>
                                        <span class="precio" data-precio-actual>$${prod.precios.find(p => p)}</span>
                                    </div>
                                    ${prod.porciones ? `<div class="porcion-info" data-porcion-container>
                                        <div class="porcion-detail">
                                            <div class="porcion-icon">${prod.iconos[defaultIdx]}</div>
                                            <div class="porcion-text">
                                                <span class="porcion-tamaño">${prod.tamanos[defaultIdx]}</span>
                                                <span class="porcion-peso">${prod.porciones[defaultIdx].peso}g</span>
                                            </div>
                                        </div>
                                        <div class="porcion-piezas">
                                            <span class="piezas-icon">🍗</span>
                                            <span class="piezas-num">${prod.porciones[defaultIdx].piezas} pz${prod.porciones[defaultIdx].compartir ? ' • Compartir' : ''}</span>
                                        </div>
                                        <div class="porcion-bar">
                                            <div class="bar-fill" style="width: ${(prod.porciones[defaultIdx].peso / 700) * 100}%"></div>
                                        </div>
                                    </div>` : ''}
                                </div>
                        `;
                        
                        card.addEventListener('click', (event) => {
                                const button = event.target.closest('.precio-btn');
                                if (button) {
                                        event.stopPropagation();
                                        const idx = Number(button.dataset.idx);
                                        seleccionarTamano(idx, prod.id, card);
                                        // Actualizar info de porciones
                                        if (prod.porciones && prod.porciones[idx]) {
                                                const porcionContainer = card.querySelector('[data-porcion-container]');
                                                if (porcionContainer) {
                                                        const porcion = prod.porciones[idx];
                                                        porcionContainer.querySelector('.porcion-icon').textContent = prod.iconos[idx];
                                                        porcionContainer.querySelector('.porcion-tamaño').textContent = prod.tamanos[idx];
                                                        porcionContainer.querySelector('.porcion-peso').textContent = porcion.peso + 'g';
                                                        porcionContainer.querySelector('.piezas-num').textContent = porcion.piezas + ' pz' + (porcion.compartir ? ' • Compartir' : '');
                                                        porcionContainer.querySelector('.bar-fill').style.width = ((porcion.peso / 700) * 100) + '%';
                                                        // Animación
                                                        gsap.from(porcionContainer, { opacity: 0.5, duration: 0.3 });
                                                }
                                        }
                                } else {
                                        abrirModal(prod);
                                }
                        });
                        // Reveal animation para cada tarjeta
                        setTimeout(() => {
                                gsap.from(card, {
                                        opacity: 0,
                                        y: 40,
                                        duration: 0.5,
                                        ease: 'power2.out'
                                });
                        }, 80);
                        return card;
                }
        // Tarjeta simple
        function renderSimpleCard(prod) {
            const card = document.createElement('div');
            card.className = 'simple-card';
            card.onclick = () => abrirModal(prod);
            card.innerHTML = `
                <img class="producto-img" src="${prod.img}" alt="${prod.nombre}" loading="lazy">
                <div class="simple-nombre">${prod.nombre}</div>
                <div class="simple-precio">$${prod.precio ?? ''}</div>
            `;
            setTimeout(() => {
                gsap.from(card, {
                    opacity: 0,
                    y: 40,
                    duration: 0.5,
                    ease: 'power2.out'
                });
            }, 80);
            return card;
        }
        // Tarjeta combo
        function renderComboCard(prod) {
            const card = document.createElement('div');
            card.className = 'simple-card';
            card.innerHTML = `
                <div class="simple-nombre">${prod.nombre}</div>
                <div>${prod.incluye}</div>

                <div class="simple-ahorro">${prod.ahorro}</div>
                ${prod.nota ? `<div class="simple-nota">${prod.nota}</div>` : ''}
            `;
            setTimeout(() => {
                gsap.from(card, {
                    opacity: 0,
                    y: 40,
                    duration: 0.5,
                    ease: 'power2.out'
                });
            }, 80);
            return card;
        }
        // ===================
        // MODAL PRODUCTO
        // ===================
        const modalBg = document.getElementById('modalBg');
        function abrirModal(prod) {
            let tamanoSel = Array.isArray(prod.precios) ? prod.precios.findIndex(p => p) : 0;
            modalBg.style.display = 'flex';
            modalBg.innerHTML = `
                <div class="modal glass-modal">
                    <button class="modal-cerrar" onclick="cerrarModal()">×</button>
                    <img class="modal-img" src="${prod.img}" alt="${prod.nombre}" loading="lazy">
                    <div class="modal-nombre">${prod.nombre} ${prod.badge ? `<span class=\"badge ${prod.badge === 'NUEVO' ? 'nuevo' : 'mas-pedido'}\">${prod.badge}</span>` : ''}</div>
                    <div class="modal-desc">${prod.desc ?? ''}</div>
                    ${Array.isArray(prod.precios) && prod.precios.filter(p => p).length > 1 ? `
                    <div class="modal-precios">
                        <div class="precio-btns">
                            ${prod.precios.map((precio, i) => precio ? `<button type="button" class="precio-btn${i === tamanoSel ? ' selected' : ''}" data-idx="${i}">${prod.iconos[i]} ${prod.tamanos[i]}</button>` : '').join('')}
                        </div>
                        <span class="precio" id="modalPrecio">$${prod.precios[tamanoSel]}</span>
                    </div>` : prod.precio ? `<div class="modal-precios"><span class="precio">$${prod.precio}</span></div>` : (Array.isArray(prod.precios) ? `<div class="modal-precios"><span class="precio">$${prod.precios.find(p => p)}</span></div>` : '')}
                    <button class="ordenar-btn" onclick="ordenarWhatsApp('${prod.nombre}')">Ordenar por WhatsApp</button>
                </div>
            `;
            // Animación modal glass
            gsap.from('.glass-modal', {
                scale: 0.7,
                opacity: 0,
                duration: 0.35,
                ease: 'back.out(1.7)'
            });
            // Guardar selección en modal
            window._modalProd = prod;
            window._modalTamano = tamanoSel;

            modalBg.querySelectorAll('.precio-btn').forEach((button) => {
                button.addEventListener('click', (event) => {
                    event.stopPropagation();
                    seleccionarTamanoModal(Number(button.dataset.idx));
                });
            });
        }
        function cerrarModal() {
            gsap.to('.glass-modal', {
                scale: 0.8,
                opacity: 0,
                duration: 0.2,
                onComplete: () => {
                    modalBg.style.display = 'none';
                    modalBg.innerHTML = '';
                }
            });
        }
                // ===================
                // ORDENAR WHATSAPP
                // ===================
                function ordenarWhatsApp(producto) {
                    const numero = "526331158329";
                    const mensaje = `Hola, quiero ordenar: ${producto} 🍗🔥`;
                    const url = `https://wa.me/${numero}?text=${encodeURIComponent(mensaje)}`;
                    window.open(url, '_blank');
                }
        function seleccionarTamanoModal(idx) {
            window._modalTamano = idx;
            const btns = modalBg.querySelectorAll('.precio-btn');
            btns.forEach((b, i) => b.classList.toggle('selected', i === idx));
            const prod = window._modalProd;
            modalBg.querySelector('#modalPrecio').textContent = `$${prod.precios[idx]}`;
        }
        //
        // ===================
        // NAVEGACIÓN
        // ===================
        navTabs.querySelectorAll('.nav-tab').forEach(tab => {
            tab.onclick = function () {
                navTabs.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                document.getElementById(this.dataset.cat).scrollIntoView({ behavior: 'smooth', block: 'start' });
                gsap.from(document.getElementById(this.dataset.cat), {
                    backgroundColor: '#ff3b3011',
                    duration: 0.5,
                    ease: 'power1.out'
                });
            };
        });
        // ===================
        // TAMAÑO EN TARJETA
        // ===================
        function seleccionarTamano(idx, prodId, card) {
            card.querySelectorAll('.precio-btn').forEach((b, i) => b.classList.toggle('selected', i === idx));
            const prod = menu[0].productos.find(p => p.id === prodId);
            if (prod && prod.precios[idx]) {
                card.querySelector('[data-precio-actual]').textContent = `$${prod.precios[idx]}`;
            }
        }
        // ===================
        // EFECTOS VISUALES
        // ===================

        // Animación inicial y reveal
        window.addEventListener('load', () => {
            gsap.from(".glass-header", {
                y: -80,
                opacity: 0,
                duration: 1
            });
            gsap.from(".glass-nav", {
                y: -40,
                opacity: 0,
                duration: 0.7,
                delay: 0.2
            });
            gsap.from(".ambient-bg", {
                opacity: 0,
                duration: 1.2
            });
        });

        // ===================
        // SCROLL SPY NAV
        // ===================

        window.addEventListener('scroll', () => {
            let current = '';
            document.querySelectorAll('main section').forEach(section => {
                const sectionTop = section.offsetTop;
                if (scrollY >= sectionTop - 200) {
                    current = section.getAttribute('id');
                }
            });
            document.querySelectorAll('.nav-tab').forEach(tab => {
                tab.classList.remove('active');
                if (tab.dataset.cat === current) {
                    tab.classList.add('active');
                }
            });
        });

        // ===================
        // TOAST NOTIFICATIONS
        // ===================
        function showToast(msg, type = 'info') {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerText = msg;
            toastContainer.appendChild(toast);
            gsap.fromTo(toast, { y: 50, opacity: 0 }, { y: 0, opacity: 1, duration: 0.3 });
            setTimeout(() => {
                gsap.to(toast, {
                    opacity: 0,
                    y: 50,
                    duration: 0.3,
                    onComplete: () => toast.remove()
                });
            }, 2200);
        }

        // ===================
        // INICIALIZAR
        // ===================
        renderMenu();
    </script>
